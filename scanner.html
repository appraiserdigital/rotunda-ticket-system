<!DOCTYPE html>
<html lang="en">
<head>
  <title>Ticket Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      min-height: 100vh;
    }

    header {
      padding: 18px;
      font-size: 18px;
      font-weight: bold;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
    }

    #reader {
      width: 300px;
      margin: 24px auto 0;
    }

    #status-bar {
      margin-top: 16px;
      font-size: 13px;
      color: #666;
      min-height: 20px;
    }

    /* Full-screen result overlay */
    #result {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
      text-align: center;
      padding: 30px;
      gap: 8px;
    }
    #result.visible { display: flex; }

    #result-icon { font-size: 40px; }

    #result-name {
      font-size: 22px;
      font-weight: bold;
      opacity: 0.95;
    }

    /* Tour name — prominent display for staff */
    #result-tour {
      font-size: 17px;
      font-weight: normal;
      opacity: 0.9;
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
      padding: 8px 20px;
      margin-top: 4px;
      max-width: 320px;
      line-height: 1.4;
    }

    .tour-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.7;
      display: block;
      margin-bottom: 2px;
    }

    .btn {
      font-size: 18px;
      font-weight: bold;
      padding: 16px 32px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 12px;
      min-width: 200px;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.7; }

    .green  { background: #16a34a; color: #fff; }
    .orange { background: #f97316; color: #fff; }
    .red    { background: #dc2626; color: #fff; }
    .blue   { background: #2563eb; color: #fff; }
    .grey   { background: #374151; color: #fff; }
  </style>
</head>
<body>

  <header>🎟 Ticket Scanner — Rotunda of Mosta</header>
  <div id="reader"></div>
  <div id="status-bar">Initialising camera…</div>

  <!-- Result overlay -->
  <div id="result">
    <div id="result-icon"></div>
    <div id="result-name"></div>
    <div id="result-tour" style="display:none">
      <span class="tour-label">Tour</span>
      <span id="result-tour-name"></span>
    </div>
    <button id="btn-confirm" class="btn blue" onclick="confirmEntry()" style="display:none">
      ✅ Confirm Entry
    </button>
    <button id="btn-cancel" class="btn grey" onclick="resetScanner()" style="display:none">
      Cancel
    </button>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <script>
    let scanned        = false;
    let pendingUseUrl  = null;
    let scannerRunning = false;

    const resultEl    = document.getElementById("result");
    const iconEl      = document.getElementById("result-icon");
    const nameEl      = document.getElementById("result-name");
    const tourBox     = document.getElementById("result-tour");
    const tourNameEl  = document.getElementById("result-tour-name");
    const btnConfirm  = document.getElementById("btn-confirm");
    const btnCancel   = document.getElementById("btn-cancel");
    const statusBar   = document.getElementById("status-bar");

    const SCAN_CONFIG = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
    const html5QrCode = new Html5Qrcode("reader");

    // ── Scanner start / stop ─────────────────────────────
    function startScanner() {
      if (scannerRunning) return;
      html5QrCode.start({ facingMode: "environment" }, SCAN_CONFIG, onScanSuccess)
        .then(() => { scannerRunning = true; statusBar.textContent = "Ready — point at ticket QR code"; })
        .catch(err => { statusBar.textContent = "Camera error: " + err; });
    }

    function stopScanner() {
      if (!scannerRunning) return Promise.resolve();
      return html5QrCode.stop()
        .then(() => { scannerRunning = false; })
        .catch(() => { scannerRunning = false; });
    }

    // ── UI ───────────────────────────────────────────────
    function showResult(bgClass, icon, name, tour, showButtons) {
      resultEl.className = bgClass + " visible";
      iconEl.textContent = icon;
      nameEl.textContent = name || "";

      // Show tour name prominently if available
      if (tour) {
        tourNameEl.textContent = tour;
        tourBox.style.display  = "block";
      } else {
        tourBox.style.display  = "none";
        tourNameEl.textContent = "";
      }

      btnConfirm.style.display = showButtons ? "block" : "none";
      btnCancel.style.display  = showButtons ? "block" : "none";
      btnConfirm.disabled      = false;
      btnCancel.disabled       = false;
      btnConfirm.textContent   = "✅ Confirm Entry";
    }

    function resetScanner() {
      scanned        = false;
      pendingUseUrl  = null;
      resultEl.className     = "";
      iconEl.textContent     = "";
      nameEl.textContent     = "";
      tourBox.style.display  = "none";
      tourNameEl.textContent = "";
      statusBar.textContent  = "Restarting…";
      stopScanner().then(() => startScanner());
    }

    // ── Scan handler ─────────────────────────────────────
    function onScanSuccess(decodedText) {
      if (scanned) return;
      scanned = true;
      statusBar.textContent = "Checking…";

      const useUrl = decodedText.replace("/check/", "/use/");
      if (decodedText === useUrl) {
        showResult("red", "❌ INVALID QR", "", "", false);
        setTimeout(resetScanner, 2500);
        return;
      }

      pendingUseUrl = useUrl;

      fetch(decodedText)
        .then(r => r.json())
        .then(data => {
          const tour = data.tour || "";
          if (data.status === "VALID") {
            showResult("green", "✅ VALID", data.name || "", tour, true);
          } else if (data.status === "ALREADY_USED") {
            showResult("orange", "⚠️ ALREADY USED", data.name || "", tour, false);
            setTimeout(resetScanner, 3500);
          } else if (data.status === "EXPIRED") {
            showResult("orange", "⏰ EXPIRED", data.name || "", tour, false);
            setTimeout(resetScanner, 3500);
          } else {
            showResult("red", "❌ INVALID", "", "", false);
            setTimeout(resetScanner, 2500);
          }
        })
        .catch(() => {
          showResult("red", "❌ NETWORK ERROR", "", "", false);
          setTimeout(resetScanner, 2500);
        });
    }

    // ── Confirm entry ────────────────────────────────────
    function confirmEntry() {
      if (!pendingUseUrl) return;
      btnConfirm.disabled    = true;
      btnCancel.disabled     = true;
      btnConfirm.textContent = "Processing…";

      fetch(pendingUseUrl)
        .then(r => r.json())
        .then(data => {
          const tour = data.tour || tourNameEl.textContent || "";
          if (data.status === "USED") {
            showResult("blue", "🎟 ENTRY CONFIRMED", data.name || "", tour, false);
          } else if (data.status === "ALREADY_USED") {
            showResult("orange", "⚠️ ALREADY USED", data.name || "", tour, false);
          } else {
            showResult("red", "❌ CONFIRM FAILED", "", "", false);
          }
          setTimeout(resetScanner, 2500);
        })
        .catch(() => {
          showResult("red", "❌ NETWORK ERROR", "", "", false);
          setTimeout(resetScanner, 2500);
        });
    }

    startScanner();
  </script>

</body>
</html>
