<!DOCTYPE html>
<html lang="en">
<head>
  <title>Ticket Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
      min-height: 100vh;
    }

    header {
      padding: 18px;
      font-size: 18px;
      font-weight: bold;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
    }

    #reader {
      width: 300px;
      margin: 24px auto 0;
    }

    #status-bar {
      margin-top: 16px;
      font-size: 13px;
      color: #666;
      min-height: 20px;
    }

    /* Full-screen result overlay */
    #result {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: bold;
      text-align: center;
      padding: 30px;
      gap: 12px;
    }
    #result.visible { display: flex; }

    #result .sub {
      font-size: 18px;
      font-weight: normal;
      opacity: 0.85;
      margin-top: 4px;
    }

    .btn {
      font-size: 18px;
      font-weight: bold;
      padding: 16px 32px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 8px;
      min-width: 200px;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.7; }

    .green  { background: #16a34a; color: #fff; }
    .orange { background: #f97316; color: #fff; }
    .red    { background: #dc2626; color: #fff; }
    .blue   { background: #2563eb; color: #fff; }
    .grey   { background: #374151; color: #fff; }
  </style>
</head>
<body>

  <header>🎟 Ticket Scanner — Rotunda of Mosta</header>
  <div id="reader"></div>
  <div id="status-bar">Initialising camera…</div>

  <!-- Result overlay -->
  <div id="result">
    <div id="result-icon"></div>
    <div id="result-name" class="sub"></div>
    <button id="btn-confirm" class="btn blue" onclick="confirmEntry()" style="display:none">
      ✅ Confirm Entry
    </button>
    <button id="btn-cancel"  class="btn grey" onclick="resetScanner()" style="display:none">
      Cancel
    </button>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <script>
    // ─────────────────────────────────────────
    // State
    // ─────────────────────────────────────────
    let scanned      = false;
    let pendingUseUrl = null;   // set after a VALID check, cleared on reset

    const resultEl    = document.getElementById("result");
    const iconEl      = document.getElementById("result-icon");
    const nameEl      = document.getElementById("result-name");
    const btnConfirm  = document.getElementById("btn-confirm");
    const btnCancel   = document.getElementById("btn-cancel");
    const statusBar   = document.getElementById("status-bar");

    // ─────────────────────────────────────────
    // UI helpers
    // ─────────────────────────────────────────
    function showResult(bgClass, icon, name, showButtons) {
      resultEl.className = bgClass + " visible";
      iconEl.textContent  = icon;
      nameEl.textContent  = name || "";
      btnConfirm.style.display = showButtons ? "block" : "none";
      btnCancel.style.display  = showButtons ? "block" : "none";
    }

    function resetScanner() {
      scanned       = false;
      pendingUseUrl = null;
      resultEl.className = "";
      iconEl.textContent = nameEl.textContent = "";
      statusBar.textContent = "Ready — point at ticket QR code";
    }

    // ─────────────────────────────────────────
    // QR scan handler
    // ─────────────────────────────────────────
    function onScanSuccess(decodedText) {
      if (scanned) return;
      scanned = true;
      statusBar.textContent = "Checking…";

      // decodedText should be: https://your-domain.onrender.com/check/<uuid>
      // Build the /use/ URL by replacing /check/ with /use/
      const useUrl = decodedText.replace("/check/", "/use/");

      if (decodedText === useUrl) {
        // URL didn't contain /check/ — might be a foreign or malformed QR
        showResult("red", "❌ INVALID QR", "", false);
        setTimeout(resetScanner, 2500);
        return;
      }

      // Store for confirmEntry to use
      pendingUseUrl = useUrl;

      // Call /check/:id first — read-only, safe
      fetch(decodedText)
        .then(r => r.json())
        .then(data => {
          if (data.status === "VALID") {
            showResult("green", "✅ VALID", data.name || "", true);
          } else if (data.status === "ALREADY_USED") {
            showResult("orange", "⚠️ ALREADY USED", data.name || "", false);
            setTimeout(resetScanner, 3000);
          } else {
            showResult("red", "❌ INVALID", "", false);
            setTimeout(resetScanner, 2500);
          }
        })
        .catch(() => {
          showResult("red", "❌ NETWORK ERROR", "", false);
          setTimeout(resetScanner, 2500);
        });
    }

    // ─────────────────────────────────────────
    // Confirm entry — calls /use/:id
    // ─────────────────────────────────────────
    function confirmEntry() {
      if (!pendingUseUrl) return;
      btnConfirm.disabled = true;
      btnCancel.disabled  = true;
      btnConfirm.textContent = "Processing…";

      fetch(pendingUseUrl)
        .then(r => r.json())
        .then(data => {
          if (data.status === "USED") {
            showResult("blue", "🎟 ENTRY CONFIRMED", data.name || "", false);
          } else if (data.status === "ALREADY_USED") {
            showResult("orange", "⚠️ ALREADY USED", data.name || "", false);
          } else {
            showResult("red", "❌ CONFIRM FAILED", "", false);
          }
          setTimeout(resetScanner, 3000);
        })
        .catch(() => {
          showResult("red", "❌ NETWORK ERROR", "", false);
          setTimeout(resetScanner, 2500);
        });
    }

    // ─────────────────────────────────────────
    // Start camera
    // ─────────────────────────────────────────
    const html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0,
      },
      onScanSuccess
    ).then(() => {
      statusBar.textContent = "Ready — point at ticket QR code";
    }).catch(err => {
      statusBar.textContent = "Camera error: " + err;
    });
  </script>

</body>
</html>
